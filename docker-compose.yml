version: '3.8'

services:
  webchat:
    build: ./webchat
    container_name: webchat-app
    ports:
      - "3000:3000"
    environment:
      - STT_API_URL=http://whisper-stt:8000/v1/audio/transcriptions
    env_file:
      - .env.secret
    restart: unless-stopped
    networks:
      - lms-network

  whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: whisper-stt
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - WHISPER_MODEL=Systran/faster-whisper-small
      - HF_HOME=/models
    volumes:
      - whisper-models:/models
    restart: unless-stopped
    networks:
      - lms-network

volumes:
  whisper-models:

networks:
  lms-network:
    name: lms-network
    attachable: true
