version: '3.8'

services:
  webchat:
    build: ./webchat
    container_name: webchat-app
    ports:
      - "3000:3000"
    env_file:
      - .env.secret
    restart: unless-stopped
    networks:
      - lms-network

  whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: whisper-stt
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - WHISPER_MODEL=small 
    restart: unless-stopped
    networks:
      - lms-network

networks:
  lms-network:
    name: lms-network
    attachable: true
